name: Build and deploy MARP deck

on:
  push:
    branches: [main]
    paths:
      - "docs/presentation.md"
      - ".github/workflows/marp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deck with Marp
        uses: docker://marpteam/marp-cli:v3
        with:
          args: --html --allow-local-files -o site/index.html docs/presentation.md
        env:
          MARP_USER: root:root

      - name: Also export PDF
        uses: docker://marpteam/marp-cli:v3
        with:
          args: --html --allow-local-files --pdf -o site/presentation.pdf docs/presentation.md
        env:
          MARP_USER: root:root

      - name: Copy images next to the deck
        run: |
          mkdir -p site/images
          if [ -d docs/images ]; then cp -r docs/images/* site/images/ 2>/dev/null || true; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
