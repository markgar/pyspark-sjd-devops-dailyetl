name: Build and deploy MARP deck

on:
  push:
    branches: [main]
    paths:
      - "docs/presentation.md"
      - ".github/workflows/marp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli@latest

      - name: Build HTML
        run: |
          mkdir -p site
          marp --html --allow-local-files -o site/index.html docs/presentation.md

      - name: Build PDF
        run: marp --html --allow-local-files --pdf -o site/presentation.pdf docs/presentation.md

      - name: Copy images
        run: |
          mkdir -p site/images
          if [ -d docs/images ]; then cp -r docs/images/. site/images/ 2>/dev/null || true; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
